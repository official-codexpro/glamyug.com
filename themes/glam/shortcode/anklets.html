<!-- ═══════════════════════════════════════════════════════════
     FEATURED PRODUCTS (anklets FILTERED)
═══════════════════════════════════════════════════════════ -->
<section class="bg-white py-20 overflow-hidden">
  <div class="w-full max-w-[1440px] 2xl:max-w-[1700px] mx-auto px-6 md:px-12 lg:px-20 relative">

 <div class="w-full flex items-center justify-center py-4 md:py-6">

  <!-- Left Line -->
  <div class="flex-1 max-w-[60px] md:max-w-[120px] h-[1px] bg-gradient-to-r from-transparent via-black/30 to-transparent"></div>

  <!-- Text -->
  <div class="px-4 md:px-8 text-[11px] md:text-[15px] tracking-[0.35em] md:tracking-[0.5em] uppercase text-black whitespace-nowrap">
    Anklets   </div>

  <!-- Right Line -->
  <div class="flex-1 max-w-[60px] md:max-w-[120px] h-[1px] bg-gradient-to-l from-transparent via-black/30 to-transparent"></div>

</div>

    <div class="relative overflow-hidden w-full">
      
      <div class="infinite-track group flex gap-6 w-max">
        
        {% for i in "12" %} 
        <div class="flex gap-6">
          {% for product in anklets_products %}
          <div class="flex-none w-[280px] md:w-[320px] lg:w-[380px]">
            <div class="flex flex-col bg-white">
              <div class="relative overflow-hidden aspect-[4/5] bg-[#f6f6f6]">
                <a href="{% url 'catalog:product_detail' product.slug %}" class="block w-full h-full">
                  {% if product.image %}
                  <img src="{{ product.image.url }}" alt="{{ product.title }}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105">
                  {% else %}
                  <div class="w-full h-full flex items-center justify-center text-gray-300 uppercase tracking-widest text-[10px]">No Image</div>
                  {% endif %}
                </a>
                
                {% if product.is_in_stock %}
                <div class="absolute bottom-0 left-0 right-0 translate-y-full group-hover:translate-y-0 transition-all duration-500">
                  <form method="post" action="{% url 'catalog:cart_add' product.id %}">
                    {% csrf_token %}
                    <input type="hidden" name="quantity" value="1">
                    <button type="submit" class="flex items-center justify-center gap-3 w-full bg-[#1a1a1a] text-white text-[10px] tracking-[0.2em] uppercase font-bold py-4 border-t border-white/10">
                      Add to Cart
                    </button>
                  </form>
                </div>
                {% endif %}
              </div>

              <div class="pt-6 flex flex-col items-center text-center">
                <h3 class="product-title text-[13px] tracking-widest uppercase font-medium text-black mb-3">
                   {{ product.title }}
                </h3>
                <style>.product-title { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }</style>
                <span class="text-[14px] font-medium text-black">{{ CURRENCY_SYMBOL }}{{ product.price }}</span>
              </div>
            </div>
          </div>
          {% endfor %}
        </div>
        {% endfor %}

      </div>
    </div>
  </div>
</section>

<style>
  /* Infinite Scroll Animation */
  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(calc(-50% - 12px)); } /* Shifting exactly half the track width minus half gap */
  }

  .infinite-track {
    display: flex;
    animation: scroll 30s linear infinite; /* Speed adjusted: 30s for a smooth but slightly faster feel */
  }

  /* Pause on hover */
  .infinite-track:hover {
    animation-play-state: paused;
  }

  /* Mobile Adjustments */
  @media (max-width: 768px) {
    .infinite-track {
      animation-duration: 20s; /* Faster for smaller screens */
    }
  }
</style>
