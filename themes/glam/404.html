<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found | Glamyug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400&display=swap');

        * { box-sizing: border-box; }
        body { font-family: 'Lato', sans-serif; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }

        /* ── Diamond gem ── */
        @keyframes gemFloat {
            0%, 100% { transform: translateY(0)   rotate(-5deg) scale(1);   }
            33%       { transform: translateY(-18px) rotate(5deg) scale(1.05); }
            66%       { transform: translateY(-8px) rotate(-2deg) scale(0.98); }
        }
        @keyframes gemGlow {
            0%, 100% { filter: drop-shadow(0 0 6px #f9a8d4) drop-shadow(0 0 12px #fbbf24); }
            50%       { filter: drop-shadow(0 0 20px #f472b6) drop-shadow(0 0 40px #fbbf24); }
        }
        .gem-wrap {
            animation: gemFloat 4s ease-in-out infinite, gemGlow 3s ease-in-out infinite;
        }

        /* ── Shimmer on "404" ── */
        @keyframes shimmer {
            0%   { background-position: -300% center; }
            100% { background-position:  300% center; }
        }
        .shimmer-text {
            background: linear-gradient(90deg,
                #d97706 0%, #fbbf24 20%, #fff7ed 40%,
                #fbbf24 60%, #d97706 80%, #b45309 100%);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }

        /* ── Sparkle particles ── */
        @keyframes sparkle {
            0%        { opacity: 0; transform: scale(0) rotate(0deg);   }
            50%       { opacity: 1; transform: scale(1) rotate(180deg); }
            100%      { opacity: 0; transform: scale(0) rotate(360deg); }
        }
        .spark {
            position: absolute;
            width: 8px; height: 8px;
            clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
            background: #fbbf24;
            animation: sparkle 2s ease-in-out infinite;
        }
        .spark:nth-child(1)  { top: 10%; left: 15%; animation-delay: 0s;    animation-duration: 2.1s; width:10px; height:10px; background:#f9a8d4; }
        .spark:nth-child(2)  { top: 20%; left: 80%; animation-delay: .4s;   animation-duration: 1.8s; background:#fbbf24; }
        .spark:nth-child(3)  { top: 70%; left: 10%; animation-delay: .8s;   animation-duration: 2.4s; width:12px; height:12px; background:#c084fc; }
        .spark:nth-child(4)  { top: 75%; left: 85%; animation-delay: .2s;   animation-duration: 1.9s; background:#f9a8d4; }
        .spark:nth-child(5)  { top: 5%;  left: 55%; animation-delay: 1.2s;  animation-duration: 2.2s; background:#fbbf24; }
        .spark:nth-child(6)  { top: 85%; left: 45%; animation-delay: .6s;   animation-duration: 2.0s; width:9px; height:9px; background:#fb923c; }
        .spark:nth-child(7)  { top: 40%; left: 5%;  animation-delay: 1.5s;  animation-duration: 1.7s; background:#c084fc; }
        .spark:nth-child(8)  { top: 35%; left: 92%; animation-delay: 1.0s;  animation-duration: 2.3s; width:11px; height:11px; background:#f9a8d4; }
        .spark:nth-child(9)  { top: 55%; left: 70%; animation-delay: .3s;   animation-duration: 2.5s; background:#fbbf24; }
        .spark:nth-child(10) { top: 90%; left: 20%; animation-delay: 1.8s;  animation-duration: 1.6s; background:#f472b6; }

        /* ── Orbiting small gems ── */
        @keyframes orbit {
            from { transform: rotate(0deg)   translateX(110px) rotate(0deg); }
            to   { transform: rotate(360deg) translateX(110px) rotate(-360deg); }
        }
        @keyframes orbit2 {
            from { transform: rotate(120deg) translateX(90px) rotate(-120deg); }
            to   { transform: rotate(480deg) translateX(90px) rotate(-480deg); }
        }
        @keyframes orbit3 {
            from { transform: rotate(240deg) translateX(130px) rotate(-240deg); }
            to   { transform: rotate(600deg) translateX(130px) rotate(-600deg); }
        }
        .orbit1 { position:absolute; top:50%; left:50%; width:14px; height:14px; margin:-7px; animation: orbit  6s linear infinite; }
        .orbit2 { position:absolute; top:50%; left:50%; width:10px; height:10px; margin:-5px; animation: orbit2 4s linear infinite; }
        .orbit3 { position:absolute; top:50%; left:50%; width:12px; height:12px; margin:-6px; animation: orbit3 8s linear infinite; }

        /* ── Button pulse ── */
        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(251,191,36,.5); }
            50%       { box-shadow: 0 0 0 12px rgba(251,191,36,0); }
        }
        .btn-pulse { animation: btnPulse 2s ease-in-out infinite; }

        /* ── Background bokeh ── */
        @keyframes bokeh {
            0%, 100% { transform: translateY(0)  scale(1);   opacity: .15; }
            50%       { transform: translateY(-30px) scale(1.3); opacity: .3;  }
        }
        .bokeh {
            position: absolute; border-radius: 50%;
            filter: blur(40px); pointer-events: none;
            animation: bokeh 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-rose-50 via-white to-amber-50 flex flex-col items-center justify-center text-center px-4 py-12 overflow-hidden relative">

    <!-- Background bokeh blobs -->
    <div class="bokeh w-72 h-72 bg-rose-300 top-0 left-0 -translate-x-1/2 -translate-y-1/2" style="animation-delay:0s"></div>
    <div class="bokeh w-96 h-96 bg-amber-200 bottom-0 right-0 translate-x-1/4 translate-y-1/4" style="animation-delay:2s"></div>
    <div class="bokeh w-64 h-64 bg-purple-200 top-1/2 left-10" style="animation-delay:4s"></div>

    <!-- Floating sparkles -->
    <div class="spark"></div><div class="spark"></div><div class="spark"></div>
    <div class="spark"></div><div class="spark"></div><div class="spark"></div>
    <div class="spark"></div><div class="spark"></div><div class="spark"></div>
    <div class="spark"></div>

    <!-- Gem + orbiting mini gems -->
    <div class="relative mb-6" style="width:240px;height:240px;">
        <!-- orbiting dots -->
        <div class="orbit1">
            <svg viewBox="0 0 14 14" class="w-full h-full"><polygon points="7,0 14,5 11,14 3,14 0,5" fill="#f9a8d4" stroke="#fbbf24" stroke-width="1"/></svg>
        </div>
        <div class="orbit2">
            <svg viewBox="0 0 10 10" class="w-full h-full"><polygon points="5,0 10,4 8,10 2,10 0,4" fill="#c084fc"/></svg>
        </div>
        <div class="orbit3">
            <svg viewBox="0 0 12 12" class="w-full h-full"><polygon points="6,0 12,4 9,12 3,12 0,4" fill="#fbbf24"/></svg>
        </div>

        <!-- Main gem -->
        <div class="gem-wrap absolute inset-0 flex items-center justify-center">
            <svg viewBox="0 0 120 130" width="160" height="160">
                <!-- top crown -->
                <polygon points="60,2 110,40 60,55 10,40"  fill="#fda4af" stroke="#fbbf24" stroke-width="1.5"/>
                <!-- left facet -->
                <polygon points="60,55 10,40 25,118"        fill="#fecdd3" opacity=".9"/>
                <!-- right facet -->
                <polygon points="60,55 110,40 95,118"       fill="#f9a8d4" opacity=".9"/>
                <!-- bottom -->
                <polygon points="60,55 25,118 95,118"       fill="#fb7185"/>
                <!-- sparkle glints -->
                <circle cx="75" cy="30" r="3" fill="white" opacity=".9"/>
                <circle cx="50" cy="22" r="2" fill="white" opacity=".7"/>
                <circle cx="90" cy="50" r="2" fill="white" opacity=".6"/>
            </svg>
        </div>
    </div>

    <!-- 404 -->
    <h1 class="text-9xl font-serif font-black shimmer-text leading-none mb-2">404</h1>

    <!-- Decorative line -->
    <div class="flex items-center gap-4 mb-6">
        <div class="h-px w-20 bg-gradient-to-r from-transparent to-amber-400"></div>
        <svg viewBox="0 0 20 20" class="w-5 h-5 text-amber-400 fill-current"><path d="M10 0L12.9 7.1H20L14.1 11.5L16.2 18.8L10 14.5L3.8 18.8L5.9 11.5L0 7.1H7.1Z"/></svg>
        <div class="h-px w-20 bg-gradient-to-l from-transparent to-amber-400"></div>
    </div>

    <h2 class="font-serif text-2xl md:text-3xl font-bold text-gray-800 mb-3">This jewel has gone missing!</h2>
    <p class="text-gray-500 text-base md:text-lg max-w-md mb-8 leading-relaxed">
        Oops — looks like this page slipped off like a loose charm bracelet.
        It may have moved, been renamed, or just sparkled away.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 items-center">
        <a href="/"
           class="btn-pulse inline-flex items-center gap-2 bg-gradient-to-r from-amber-500 to-rose-500 text-white font-semibold px-8 py-3 rounded-full hover:from-amber-600 hover:to-rose-600 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:scale-105">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Back to Glamyug
        </a>
        <a href="/products/"
           class="inline-flex items-center gap-2 border-2 border-amber-400 text-amber-700 font-semibold px-8 py-3 rounded-full hover:bg-amber-50 transition-all duration-300">
            Browse Collections
        </a>
    </div>

    <p class="mt-12 text-xs text-gray-400">Error 404 &mdash; Page Not Found</p>
</body>
</html>
