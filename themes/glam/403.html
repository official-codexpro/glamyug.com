<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 – Access Forbidden | Glamyug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400&display=swap');
        body { font-family: 'Lato', sans-serif; }
        h1, h2 { font-family: 'Playfair Display', serif; }

        /* ── Lock bounce ── */
        @keyframes lockBounce {
            0%, 100% { transform: translateY(0)    scale(1);    }
            20%       { transform: translateY(-12px) scale(1.05); }
            40%       { transform: translateY(-4px)  scale(.98);  }
            60%       { transform: translateY(-8px)  scale(1.02); }
            80%       { transform: translateY(-2px)  scale(.99);  }
        }
        @keyframes lockGlow {
            0%, 100% { filter: drop-shadow(0 0 8px #7c3aed) drop-shadow(0 0 20px #a78bfa); }
            50%       { filter: drop-shadow(0 0 20px #7c3aed) drop-shadow(0 0 40px #c4b5fd); }
        }
        .lock-wrap {
            animation: lockBounce 3s ease-in-out infinite, lockGlow 2.5s ease-in-out infinite;
        }

        /* ── Shackle wiggle (the loop of the lock) ── */
        @keyframes shackle {
            0%, 60%, 100% { d: path("M30,50 Q30,10 60,10 Q90,10 90,50"); }
            30%            { d: path("M30,48 Q28,8  60,8  Q92,8  90,48"); }
        }

        /* ── Gold shimmer on "403" ── */
        @keyframes goldShimmer {
            0%   { background-position: -300% center; }
            100% { background-position:  300% center; }
        }
        .gold-text {
            background: linear-gradient(90deg,
                #7c3aed 0%, #a78bfa 25%, #e9d5ff 50%, #a78bfa 75%, #7c3aed 100%);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShimmer 3s linear infinite;
        }

        /* ── Stars orbiting the lock ── */
        @keyframes orbit {
            from { transform: rotate(0deg)   translateX(100px) rotate(0deg);   }
            to   { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
        }
        @keyframes orbit2 {
            from { transform: rotate(180deg) translateX(80px)  rotate(-180deg); }
            to   { transform: rotate(540deg) translateX(80px)  rotate(-540deg); }
        }
        .orb1 { position:absolute; top:50%; left:50%; animation: orbit  5s linear infinite; }
        .orb2 { position:absolute; top:50%; left:50%; animation: orbit2 7s linear infinite; }

        /* ── Warning pulse ring ── */
        @keyframes ring {
            0%   { transform: scale(.8); opacity: .8; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .ring {
            position: absolute; inset: 0; border-radius: 50%;
            border: 2px solid #7c3aed;
            animation: ring 2s ease-out infinite;
        }
        .ring:nth-child(2) { animation-delay: .7s; }
        .ring:nth-child(3) { animation-delay: 1.4s; }

        /* ── Floating sparks ── */
        @keyframes spark {
            0%        { opacity: 0; transform: scale(0) rotate(0deg);   }
            50%       { opacity: 1; transform: scale(1) rotate(180deg); }
            100%      { opacity: 0; transform: scale(0) rotate(360deg); }
        }
        .sp {
            position: absolute;
            width: 8px; height: 8px;
            clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
            background: #a78bfa;
            animation: spark 2s ease-in-out infinite;
        }
        .sp:nth-child(1) { top:8%;  left:12%; animation-delay:0s;   background:#c084fc; }
        .sp:nth-child(2) { top:15%; left:82%; animation-delay:.5s;  background:#a78bfa; width:10px; height:10px; }
        .sp:nth-child(3) { top:78%; left:8%;  animation-delay:1s;   background:#e879f9; }
        .sp:nth-child(4) { top:82%; left:88%; animation-delay:.3s;  background:#c084fc; width:11px; height:11px; }
        .sp:nth-child(5) { top:4%;  left:50%; animation-delay:1.5s; background:#a78bfa; }
        .sp:nth-child(6) { top:88%; left:50%; animation-delay:.8s;  background:#e879f9; }

        /* ── bokeh ── */
        @keyframes bokeh {
            0%, 100% { transform: scale(1);   opacity: .12; }
            50%       { transform: scale(1.4); opacity: .22; }
        }
        .bokeh {
            position: absolute; border-radius: 50%;
            filter: blur(50px); pointer-events: none;
            animation: bokeh 7s ease-in-out infinite;
        }

        /* Button hover ring */
        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(139,92,246,.4); }
            50%       { box-shadow: 0 0 0 12px rgba(139,92,246,0); }
        }
        .btn-pulse { animation: btnPulse 2s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-50 via-white to-purple-50 flex flex-col items-center justify-center text-center px-4 py-12 overflow-hidden relative">

    <!-- Background bokeh -->
    <div class="bokeh w-80 h-80 bg-violet-300 top-0 left-0 -translate-x-1/3" style="animation-delay:0s"></div>
    <div class="bokeh w-96 h-96 bg-purple-200 bottom-0 right-0 translate-x-1/4" style="animation-delay:3s"></div>

    <!-- Floating sparks -->
    <div class="sp"></div><div class="sp"></div><div class="sp"></div>
    <div class="sp"></div><div class="sp"></div><div class="sp"></div>

    <!-- Lock + orbit gems -->
    <div class="relative mb-6" style="width:220px;height:220px;">
        <!-- Pulse rings behind lock -->
        <div class="absolute top-1/2 left-1/2 w-28 h-28 -translate-x-1/2 -translate-y-1/2">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>

        <!-- Orbiting gem 1 -->
        <div class="orb1" style="width:12px;height:12px;margin:-6px;">
            <svg viewBox="0 0 12 12" class="w-full h-full">
                <polygon points="6,0 12,4 9,12 3,12 0,4" fill="#a78bfa"/>
            </svg>
        </div>
        <!-- Orbiting gem 2 -->
        <div class="orb2" style="width:10px;height:10px;margin:-5px;">
            <svg viewBox="0 0 10 10" class="w-full h-full">
                <polygon points="5,0 10,4 8,10 2,10 0,4" fill="#e879f9"/>
            </svg>
        </div>

        <!-- Lock icon -->
        <div class="lock-wrap absolute inset-0 flex items-center justify-center">
            <svg viewBox="0 0 100 120" width="130" height="130">
                <!-- shackle (the top U-shape) -->
                <path d="M28,55 L28,35 Q28,8 50,8 Q72,8 72,35 L72,55"
                      fill="none" stroke="#7c3aed" stroke-width="10" stroke-linecap="round"/>
                <!-- body -->
                <rect x="15" y="52" width="70" height="58" rx="10" ry="10" fill="#7c3aed"/>
                <!-- keyhole -->
                <circle cx="50" cy="76" r="10" fill="#4c1d95"/>
                <rect x="45" y="76" width="10" height="18" rx="3" fill="#4c1d95"/>
                <!-- shine -->
                <ellipse cx="32" cy="68" rx="5" ry="8" fill="white" opacity=".15" transform="rotate(-20,32,68)"/>
            </svg>
        </div>
    </div>

    <!-- 403 -->
    <h1 class="text-9xl font-serif font-black gold-text leading-none mb-2">403</h1>

    <!-- Decorative line -->
    <div class="flex items-center gap-4 mb-6">
        <div class="h-px w-20 bg-gradient-to-r from-transparent to-violet-400"></div>
        <svg class="w-4 h-4 text-violet-500 fill-current" viewBox="0 0 20 20">
            <path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"/>
        </svg>
        <div class="h-px w-20 bg-gradient-to-l from-transparent to-violet-400"></div>
    </div>

    <h2 class="font-serif text-2xl md:text-3xl font-bold text-gray-800 mb-3">This treasure is off-limits!</h2>
    <p class="text-gray-500 text-base md:text-lg max-w-md mb-8 leading-relaxed">
        Like a vault sealed with the rarest lock — you don't have permission
        to access this page. Please log in or return to safety.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 items-center">
        <a href="/"
           class="btn-pulse inline-flex items-center gap-2 bg-gradient-to-r from-violet-600 to-purple-600 text-white font-semibold px-8 py-3 rounded-full hover:from-violet-700 hover:to-purple-700 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:scale-105">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Back to Home
        </a>
        <a href="/users/login/"
           class="inline-flex items-center gap-2 border-2 border-violet-400 text-violet-700 font-semibold px-8 py-3 rounded-full hover:bg-violet-50 transition-all duration-300">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
            </svg>
            Sign In
        </a>
    </div>

    <p class="mt-12 text-xs text-gray-400">Error 403 &mdash; Access Forbidden</p>
</body>
</html>
